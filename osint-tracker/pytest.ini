[pytest]
# ─────────────────────────────────────────────────────────────────
# OSINT Tracker — pytest configuration
# ─────────────────────────────────────────────────────────────────

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -q

# Custom markers — used to tag tests by category
markers =
    unit: pure unit tests, no I/O
    integration: tests that hit real APIs (skipped in CI)
    slow: tests that take more than 1 second

# Suppress noisy warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:aiohttp
    ignore::DeprecationWarning:diskcache
